services:
  - type: web
    name: farols-tech-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: farols-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/farols.db
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: ALLOW_VERCEL_PREVIEW_ORIGINS
        value: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
